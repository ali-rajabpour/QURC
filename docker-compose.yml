services:
  wordpress:
    image: wordpress:latest
    container_name: QUR_Coin_Wordpress
    restart: always
    ports:
      - "443:443"  
      - "80:80"
    environment:
      - WORDPRESS_DB_HOST=${WORDPRESS_DB_HOST}
      - WORDPRESS_DB_USER=${WORDPRESS_DB_USER}
      - WORDPRESS_DB_PASSWORD=${WORDPRESS_DB_PASSWORD}
      - WORDPRESS_DB_NAME=${WORDPRESS_DB_NAME:-defaultdb}
      - WORDPRESS_TABLE_PREFIX=qurc_                  
    volumes:
      - ./wordpress_files:/var/www/html
      - ./certificates/certs:/etc/ssl/certs:ro
      - ./certificates/private:/etc/ssl/private:ro
      - ./certificates/default-ssl.conf:/etc/apache2/sites-available/default-ssl.conf:ro
    networks:
      - wordpress_network

networks:
  wordpress_network:

volumes:
  wordpress_data: 